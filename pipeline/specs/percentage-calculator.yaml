slug: percentage-calculator
category: math
applicationCategory: UtilitiesApplication
related: [tip-calculator, compound-interest-calculator]
primaryKeyword: { en: "percentage calculator", ja: "パーセント計算機" }
inputs:
  - { name: mode, type: select, options: [pct_of, what_pct, pct_change] }
  - { name: a, type: number }
  - { name: b, type: number }
output: { type: number }
logic: |
  pct_of:     a% of b   = a/100 * b
  what_pct:   a is what % of b = a/b * 100
  pct_change: change from a to b = (b-a)/a * 100
seo: { faq_count: 8, article_sections: 3 }
locales: [en, ja]
