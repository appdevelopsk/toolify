slug: slope-calculator
category: math
applicationCategory: EducationalApplication
related:
  - triangle-calculator
  - quadratic-equation-solver
primaryKeyword:
  en: "Slope calculator"
  ja: "傾き計算機"
inputs:
  - name: x1
    type: number
  - name: y1
    type: number
  - name: x2
    type: number
  - name: y2
    type: number
output:
  type: number
logic: |
  slope m = (y2-y1)/(x2-x1); angle = atan(m) in degrees; grade% = m*100.
  Vertical line (x2==x1) => undefined.
locales: all
