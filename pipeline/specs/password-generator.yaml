slug: password-generator
category: text
applicationCategory: SecurityApplication
related: [word-counter]
primaryKeyword: { en: "password generator", ja: "パスワード生成" }
inputs:
  - { name: length, type: number, default: 16, min: 4, max: 128 }
  - { name: useUpper, type: toggle, default: true }
  - { name: useLower, type: toggle, default: true }
  - { name: useNumbers, type: toggle, default: true }
  - { name: useSymbols, type: toggle, default: true }
  - { name: avoidAmbiguous, type: toggle, default: false }
output: { type: text, withEntropy: true }
logic: |
  Use crypto.getRandomValues for cryptographic randomness.
  Build alphabet from selected options minus ambiguous chars (0OoIl1) if avoidAmbiguous.
  entropy_bits = log2(alphabet_size) * length
  Strength: <50 weak, 50-80 medium, 80-128 strong, >=128 excellent.
seo: { faq_count: 8, article_sections: 3 }
locales: [en, ja]
