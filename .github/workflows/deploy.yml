name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: []
    defaults:
      run:
        working-directory: site
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Type check
        run: npm run typecheck

      - name: i18n / SEO audits
        run: |
          npm run audit:i18n
          npm run audit:seo

      - name: Unit tests
        run: npm test

      - name: Production build (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://tools.appdevelopsk.com

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync standalone artifacts to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            .next/standalone/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            .next/static/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.next/static/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            public/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/public/"

      - name: Reload toolify on VPS via PM2 (zero-downtime)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "pm2 reload toolify --update-env && pm2 save"

      - name: Smoke test live URL
        run: |
          set -e
          for i in 1 2 3 4 5; do
            if curl -sSfL -o /dev/null -w "%{http_code}" --max-time 15 https://tools.appdevelopsk.com/en/tools/bmi-calculator | grep -q 200; then
              echo "✓ Live URL returning 200"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "✗ Live URL not returning 200 after 5 attempts"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
