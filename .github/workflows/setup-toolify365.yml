name: Setup toolify365.com on VPS

on:
  workflow_dispatch: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Add nginx config for toolify365.com
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'ENDSSH'
            set -e

            # Detect nginx sites directory
            if [ -d /etc/nginx/sites-available ]; then
              NGINX_CONF=/etc/nginx/sites-available/toolify365.com
            else
              NGINX_CONF=/etc/nginx/conf.d/toolify365.com.conf
            fi

            # Write nginx config (HTTP only first — certbot will add HTTPS)
            sudo tee "$NGINX_CONF" > /dev/null << 'EOF'
          server {
              listen 80;
              server_name toolify365.com www.toolify365.com;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          EOF

            # Enable site (Debian/Ubuntu style)
            if [ -d /etc/nginx/sites-enabled ]; then
              sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/toolify365.com
            fi

            # Test and reload nginx
            sudo nginx -t
            sudo systemctl reload nginx
            echo "nginx reloaded"
          ENDSSH

      - name: Issue SSL certificate via certbot
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo certbot --nginx -d toolify365.com -d www.toolify365.com --non-interactive --agree-tos -m app.develop.sk@gmail.com --redirect"

      - name: Smoke test new domain
        run: |
          sleep 5
          STATUS=$(curl -sSo /dev/null -w "%{http_code}" --max-time 15 https://toolify365.com/en/tools/bmi-calculator || echo "000")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ toolify365.com is live"
          else
            echo "✗ Got $STATUS — DNS may still be propagating (retry in a few minutes)"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
