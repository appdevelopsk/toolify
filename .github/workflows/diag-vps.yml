name: Diagnose VPS

on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH diagnose
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            echo "=== Toolify PM2 env (PORT) ==="
            pm2 env 92 2>/dev/null | grep -i "port\|PATH\|cwd" | head -20

            echo ""
            echo "=== toolify365.com nginx config ==="
            cat /etc/nginx/sites-enabled/toolify365.com 2>/dev/null || cat /etc/nginx/sites-available/toolify365.com 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=== tools.appdevelopsk.com nginx config ==="
            grep -rl "tools\.appdevelopsk" /etc/nginx/ 2>/dev/null | xargs grep -l "proxy_pass" 2>/dev/null | xargs cat 2>/dev/null || echo "NOT FOUND"

            echo ""
            echo "=== Listening ports ==="
            ss -tlnp | grep -E "3000|4000|5000|8000|8080" | head -20
          '
          rm -f ~/.ssh/key
