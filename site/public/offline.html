<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Offline · Toolify</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, sans-serif; color: #0f172a; background: #f8fafc;
        text-align: center; padding: 24px;
      }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { color: #475569; max-width: 28rem; }
      a { color: #0284c7; }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f1f5f9; } p { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>This page isn't available without a connection. Once you're back online, reload to continue using the tools.</p>
    <p><a href="/" onclick="location.reload()">Try again</a></p>
  </body>
</html>
